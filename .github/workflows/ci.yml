name: AIPA Studio CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  JAVA_VERSION: "17"
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"

jobs:
  # ── Java Build & Test ─────────────────────────────────────────
  java-ci:
    name: Java Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"
          cache: "gradle"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build all Java modules
        run: ./gradlew build -x test

      - name: Run Java tests
        run: ./gradlew test

      - name: Publish test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: java-test-results
          path: "**/build/reports/tests/"

  # ── Python Build & Test ───────────────────────────────────────
  python-ci:
    name: Python Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pip install poetry==1.8.3

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run Ruff lint
        run: poetry run ruff check .

      - name: Run Python tests
        run: poetry run pytest --tb=short

  # ── Node.js Build & Test ──────────────────────────────────────
  node-ci:
    name: Node.js Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build all Node.js workspaces
        run: npm run build --workspaces --if-present

      - name: Run Node.js tests
        run: npm run test --workspaces --if-present

  # ── Docker Build ──────────────────────────────────────────────
  docker-ci:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [java-ci, python-ci, node-ci]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK (for Gradle build)
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"
          cache: "gradle"

      - name: Build Runtime JAR
        run: ./gradlew :runtime:bootJar -x test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Runtime Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: installer/docker/Dockerfile.runtime
          push: false
          tags: aipa-studio/runtime:ci

      - name: Build AI Engine Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: installer/docker/Dockerfile.ai-engine
          push: false
          tags: aipa-studio/ai-engine:ci

  # ── Integration Health Check ──────────────────────────────────
  integration-ci:
    name: Integration Health Check
    runs-on: ubuntu-latest
    needs: [docker-ci]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"
          cache: "gradle"

      - name: Build Runtime JAR
        run: ./gradlew :runtime:bootJar -x test

      - name: Start services via Docker Compose
        run: |
          cp installer/docker/.env.example installer/docker/.env
          docker compose -f installer/docker/docker-compose.yml up -d
        env:
          POSTGRES_PASSWORD: ci_test_password

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for Runtime Service..."
          for i in {1..20}; do
            if curl -sf http://localhost:18080/api/v1/health; then
              echo "Runtime Service is UP"
              break
            fi
            echo "Attempt $i/20, waiting 10s..."
            sleep 10
          done

      - name: Verify Runtime health endpoint
        run: |
          response=$(curl -sf http://localhost:18080/api/v1/health)
          echo "Response: $response"
          echo "$response" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='UP', f'Expected UP, got {d[\"status\"]}'"
          echo "✅ Runtime Service health check PASSED"

      - name: Verify AI Engine health endpoint
        run: |
          response=$(curl -sf http://localhost:18082/engine/health)
          echo "Response: $response"
          echo "$response" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='UP', f'Expected UP, got {d[\"status\"]}'"
          echo "✅ AI Engine health check PASSED"

      - name: Teardown
        if: always()
        run: docker compose -f installer/docker/docker-compose.yml down -v
