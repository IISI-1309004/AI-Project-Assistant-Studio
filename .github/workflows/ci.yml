п»їname: AIPA Studio CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"

jobs:
  # ?ВЂ?ВЂ Python Build & Test ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ
  python-ci:
    name: Python Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pip install poetry==1.8.3

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run Ruff lint
        run: poetry run ruff check .

      - name: Run Python tests
        run: poetry run pytest --tb=short

  # ?ВЂ?ВЂ Node.js Build & Test ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ
  node-ci:
    name: Node.js Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build all Node.js workspaces
        run: npm run build --workspaces --if-present

      - name: Run Node.js tests
        run: npm run test --workspaces --if-present

  # ?ВЂ?ВЂ Docker Build ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ
  # ?ВЂ?ВЂ Docker Build ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ?ВЂ
  # Removed legacy еѕЊз«Ї runtime build/deployment jobs.

