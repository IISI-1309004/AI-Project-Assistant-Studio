server:
  port: 18080

spring:
  application:
    name: aipa-runtime
  datasource:
    url: jdbc:sqlite:.ai-project/knowledge/db/aipa.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

aipa:
  ai-engine-url: http://localhost:18082
  confidence-threshold: 70
  execution-max-retries: 3
  version: 1.0.0-SNAPSHOT
  # Phase 5-2: Learning + Memory Configuration
  learning:
    auto-trigger-on-completion: true
    generate-completion-report: true
    auto-reinforce-memory: true
    reinforce-max-items: 3

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.aipa: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
